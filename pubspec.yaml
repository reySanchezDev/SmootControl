name: smoo_control
description: "Offline-first restaurant sales control app."
publish_to: 'none'
version: 0.1.64+69

environment:
  sdk: ^3.11.5

dependencies:
  collection: ^1.19.1
  connectivity_plus: ^7.1.1
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.1
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
