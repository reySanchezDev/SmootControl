  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: 0.5.40
  uuid: ^4.5.3

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: 10.0.0

flutter:
